<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link class="page-icon" rel="icon" type="image/png" href="/src/assets/icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReadBloom Student Portal - My Journey</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Quicksand:wght@400..700&display=swap" rel="stylesheet">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <div id="app" class="portal-layout">
    <!-- Sidebar Navigation -->
    <nav class="portal-sidebar d-flex flex-column p-3">
      <div class="sidebar-header text-center mb-4 mt-2">
        <img src="/src/assets/logo.png" alt="ReadBloom Logo" class="sidebar-logo mb-1">
        <div class="sidebar-portal-tag">STUDENT PORTAL</div>
      </div>

      <div class="sidebar-menu flex-grow-1">
        <button class="nav-item-btn w-100 text-start py-3 px-4 mb-3 border-0" data-page="dashboard">
          Dashboard
        </button>
        <button class="nav-item-btn w-100 text-start py-3 px-4 mb-3 border-0" data-page="journey">
          My Journey
        </button>
        <button class="nav-item-btn w-100 text-start py-3 px-4 mb-3 border-0" data-page="messages">
          Messages
        </button>
        <button class="nav-item-btn w-100 text-start py-3 px-4 mb-3 border-0" data-page="profile">
          Profile
        </button>
      </div>
    </nav>

    <!-- Main Content Area -->
    <main class="portal-main">
      <div id="sub-view-journey" class="portal-content-wrapper">
        <div class="journey-stats-wrapper d-flex flex-column gap-3">

          <!-- Learning Completed -->
          <div class="stat-pill d-flex align-items-center justify-content-between">
            <span class="stat-label">Learning Completed</span>
            <span class="stat-value" id="stat-learning">20/40</span>
          </div>

          <!-- Days Streak -->
          <div class="stat-pill d-flex align-items-center justify-content-between">
            <span class="stat-label">Days Streak</span>
            <span class="stat-value" id="stat-streak">7 days</span>
          </div>

          <!-- Achievement -->
          <div class="stat-pill d-flex align-items-center justify-content-between">
            <span class="stat-label">Achievement</span>
            <span class="stat-value" id="stat-achievement">EXPLORER</span>
          </div>

        </div>
      </div>
    </main>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Journey Script -->
  <script type="module" src="/src/js/journey.js"></script>
</body>

</html>
