<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/src/assets/icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReadBloom Student Portal - Login</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Quicksand:wght@400..700&display=swap" rel="stylesheet">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>

<body>
  <div id="app">
    <!-- View 1: Login Page -->
    <div id="view-login" class="page-container d-flex align-items-center justify-content-center">
      <div class="login-card text-center p-5 shadow">
        <div class="login-logo-container mb-4">
          <img src="/src/assets/logo.png" alt="ReadBloom Logo" class="login-logo">
        </div>
        <h1 class="login-title mb-1">Welcome little one!</h1>
        <p class="login-subtitle mb-4">WHERE WORDS BLOOM, MINDS GROW</p>
        
        <form id="login-form" novalidate>
          <div class="mb-3 text-start">
            <label for="login-email" class="form-label font-bold text-uppercase">Email</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" class="form-control kid-input" id="login-email" placeholder="Enter your email" required value="adamson@read.bloom">
            </div>
          </div>
          <div class="mb-4 text-start">
            <label for="login-password" class="form-label font-bold text-uppercase">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control kid-input" id="login-password" placeholder="Enter your password" required value="password123">
            </div>
          </div>
          
          <button type="submit" class="btn btn-login-submit py-3 px-5 mb-3">LOG IN</button>
        </form>
        <div id="login-alert" class="alert alert-danger d-none mt-3" role="alert"></div>
      </div>
    </div>
  </div>
  
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Login App Script -->
  <script type="module" src="/src/js/login.js"></script>
  <script>
    // Quick helper to read error parameters (e.g. redirected due to rejected consent)
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('error') === 'consent_required') {
        const alertBox = document.getElementById('login-alert');
        if (alertBox) {
          alertBox.textContent = 'Parental consent is required to enter the ReadBloom Student Portal.';
          alertBox.classList.remove('d-none');
        }
      }
    });
  </script>
</body>

</html>
