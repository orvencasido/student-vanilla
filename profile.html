<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link class="page-icon" rel="icon" type="image/png" href="/src/assets/icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReadBloom Student Portal - Profile</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Quicksand:wght@400..700&display=swap" rel="stylesheet">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>

<body>
  <div id="app" class="portal-layout">
    <!-- Sidebar Navigation -->
    <nav class="portal-sidebar d-flex flex-column p-3">
      <div class="sidebar-header text-center mb-4 mt-2">
        <img src="/src/assets/logo.png" alt="ReadBloom Logo" class="sidebar-logo mb-1">
        <div class="sidebar-portal-tag">STUDENT PORTAL</div>
      </div>
      
      <div class="sidebar-menu flex-grow-1">
        <button class="nav-item-btn w-100 text-start py-3 px-4 mb-3 border-0" data-page="dashboard">
          Dashboard
        </button>
        <button class="nav-item-btn w-100 text-start py-3 px-4 mb-3 border-0" data-page="journey">
          My Journey
        </button>
        <button class="nav-item-btn w-100 text-start py-3 px-4 mb-3 border-0" data-page="messages">
          Messages
        </button>
        <button class="nav-item-btn w-100 text-start py-3 px-4 mb-3 border-0" data-page="profile">
          Profile
        </button>
      </div>
    </nav>

    <!-- Main Content Area -->
    <main class="portal-main">
      
      <!-- Sub-view 4: Profile Content -->
      <div id="sub-view-profile" class="portal-content-wrapper">
        <div class="profile-layout-container max-w-600 mx-auto d-flex flex-column gap-4 align-items-center">
          
          <!-- Profile Header Card -->
          <div class="profile-header-card w-100 p-4 shadow-sm bg-white rounded-4 text-center">
            <div class="profile-avatar-container mb-3 position-relative d-inline-block">
              <img src="/src/assets/icon.png" alt="Kai Adamson" class="profile-avatar border-dark">
            </div>
            <h2 class="profile-name mb-1 student-fullname-placeholder">Kai Adamson</h2>
            <div class="profile-grade-tag text-uppercase font-bold student-details-placeholder">Grade 4 Student Level 1 EXPLORER</div>
          </div>

          <!-- Personal Information Card -->
          <div class="personal-info-card w-100 p-4 shadow-sm bg-white rounded-4 text-start position-relative">
            <div class="d-flex justify-content-between align-items-center mb-4">
              <h3 class="info-section-title mb-0">Personal Information</h3>
              <button class="btn btn-outline-secondary btn-sm border-0 rounded-circle" id="btn-edit-profile" title="Edit Information">
                <i class="bi bi-pencil-fill fs-5"></i>
              </button>
            </div>
            
            <!-- Display Mode -->
            <div id="profile-display-mode" class="d-flex flex-column gap-3">
              <div class="info-row d-flex justify-content-between py-2 border-bottom">
                <div class="info-label font-bold text-muted text-uppercase">Email:</div>
                <div class="info-value font-bold" id="profile-display-email">adamson@read.bloom</div>
              </div>
              <div class="info-row d-flex justify-content-between py-2 border-bottom">
                <div class="info-label font-bold text-muted text-uppercase">Section:</div>
                <div class="info-value font-bold" id="profile-display-section">Mabini</div>
              </div>
              <div class="info-row d-flex justify-content-between py-2">
                <div class="info-label font-bold text-muted text-uppercase">Last Log In:</div>
                <div class="info-value font-bold" id="profile-display-login">4/19/2026</div>
              </div>
            </div>

            <!-- Edit Mode Form (Hidden initially) -->
            <form id="profile-edit-form" class="d-none">
              <div class="mb-3">
                <label for="edit-name" class="form-label font-bold text-uppercase">Full Name</label>
                <input type="text" class="form-control kid-input" id="edit-name" value="Kai Adamson" required>
              </div>
              <div class="mb-3">
                <label for="edit-email" class="form-label font-bold text-uppercase">Email</label>
                <input type="email" class="form-control kid-input" id="edit-email" value="adamson@read.bloom" required>
              </div>
              <div class="mb-3">
                <label for="edit-section" class="form-label font-bold text-uppercase">Section</label>
                <input type="text" class="form-control kid-input" id="edit-section" value="Mabini" required>
              </div>
              <div class="d-flex gap-2 justify-content-end mt-4">
                <button type="button" class="btn btn-secondary py-2 px-4 rounded-pill" id="btn-cancel-profile">Cancel</button>
                <button type="submit" class="btn btn-success py-2 px-4 rounded-pill font-bold" id="btn-save-profile">Save Changes</button>
              </div>
            </form>
          </div>

          <!-- Logout Button container -->
          <div class="w-100 text-center mt-3">
            <button id="btn-logout" class="btn btn-logout-submit py-3 w-100 font-bold">Logout</button>
          </div>

        </div>
      </div>
    </main>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Profile Script -->
  <script type="module" src="/src/js/profile.js"></script>
</body>

</html>
